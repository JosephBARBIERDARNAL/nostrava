name: Android APK Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build and release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Test frontend
        run: npm run test:run

      - name: Test Rust
        working-directory: src-tauri
        run: cargo test --lib

      - name: Build debug APK
        run: npm run tauri -- android build --debug --apk --target aarch64

      - name: Prepare APK asset
        id: asset
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          APK_SOURCE="$(find src-tauri/gen/android/app/build/outputs/apk -path "*/debug/*.apk" -print -quit)"
          if [ -z "$APK_SOURCE" ]; then
            echo "No debug APK found"
            exit 1
          fi
          APK_NAME="nostrava-android-debug-${SHORT_SHA}.apk"
          cp "$APK_SOURCE" "$APK_NAME"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ steps.asset.outputs.short_sha }}
          name: Nostrava Android ${{ steps.asset.outputs.short_sha }}
          prerelease: true
          files: ${{ steps.asset.outputs.apk_name }}
